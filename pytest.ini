[pytest]
# ── Test discovery ────────────────────────────────────────
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Markers ───────────────────────────────────────────────
markers =
    system: System-level tests
    integration: Integration tests
    unit: Unit tests
    software: Software-level tests
    functional: Functional tests
    regression: Regression tests
    smoke: Smoke tests
    semi_automatic: Requires manual observation during run
    automatic: Fully automated
    manual: Manual execution only
    hw_depend: Requires physical hardware
    test_id: Test case ID marker

# ── Logging ───────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_file = reports/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s

# ── Default options ───────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/html/report.html
    --self-contained-html
    --css=assets/report.css
    --junitxml=reports/junit.xml

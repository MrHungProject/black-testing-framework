# ══════════════════════════════════════════════════════════
#  Framework Settings
#  Các giá trị có thể override bằng environment variable:
#    SERIAL_PORT=COM5 pytest ...
# ══════════════════════════════════════════════════════════

app:
  name: "FormMainEliteRF"
  exe_path: "C:/EliteRF/PC17.exe"   # <<< cập nhật đường dẫn thật nếu khác
  backend: "uia"                       # uia | win32
  connect_timeout: 15
  action_delay: 0.1

s2vna:
  name: "S2VNA"
  exe_path: "C:/VNA/S2VNA/S2VNA.exe" # <<< cập nhật đường dẫn thật
  backend: "uia"
  connect_timeout: 15
  startup_wait: 3                      # giây chờ sau khi launch

spike:
  name: "Spike"
  exe_path: "C:/Program Files/Signal Hound/Spike/Spike.exe"  # <<< cập nhật nếu khác
  backend: "uia"
  connect_timeout: 15
  startup_wait: 3                      # giây chờ sau khi launch
                                       # override bằng env: SPIKE_EXE_PATH=...

serial:
  default_port: "COM3"                # override bằng env: SERIAL_PORT=COMx
  baudrate: 115200
  bytesize: 8
  parity: "N"
  stopbits: 1
  timeout: 2.0
  write_timeout: 2.0
  auto_detect: true

relay:
  enabled: false
  port: "COM10"
  baudrate: 9600
  channels: 4
  power_cycle_delay: 3.0

report:
  output_dir: "reports"
  html_dir: "reports/html"
  excel_dir: "reports/excel"
  log_dir: "reports/logs"
  excel_filename: "test_results.xlsx"
  include_screenshots: true
  screenshot_on_fail: true

testrail:
  enabled: false
  url: "https://yourcompany.testrail.io"
  username: ""
  api_key: ""
  project_id: 1
  suite_id: 1
